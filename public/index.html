<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bahEMR — 로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
  <div class="auth-bg">
    <div class="grid-pattern"></div>
  </div>

  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-cross">⚕</span>
        <h1>bah<strong>EMR</strong></h1>
        <p class="auth-subtitle">사전접수 데이터 수집 포털</p>
      </div>

      <form class="auth-form" id="loginForm" autocomplete="off">
        <div class="form-field">
          <label for="email">이메일</label>
          <input type="email" id="email" name="email" placeholder="example@company.com" required autocomplete="username" />
        </div>
        <div class="form-field">
          <label for="password">비밀번호</label>
          <div class="pw-wrap">
            <input type="password" id="password" name="password" placeholder="비밀번호 입력" required autocomplete="current-password" />
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="비밀번호 표시">
              <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="form-error" id="loginError"></div>

        <button type="submit" class="btn-primary" id="loginBtn">
          <span class="btn-text">로그인</span>
          <span class="btn-spinner" style="display:none">
            <svg class="spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
          </span>
        </button>
      </form>

      <div class="auth-footer">
        <span>계정이 없으신가요?</span>
        <a href="/signup.html">회원가입 신청</a>
      </div>
    </div>
  </main>

  <script src="/js/auth.js"></script>
</body>
</html>
